name: Deploy Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: Set environment variables
      id: env
      run: |
        ENV="${{ inputs.environment }}"
        if [ "$ENV" = "production" ]; then
          echo "values_file=values.prod.yaml" >> $GITHUB_OUTPUT
        elif [ "$ENV" = "staging" ]; then
          echo "values_file=values.test.yaml" >> $GITHUB_OUTPUT
        else
          echo "values_file=values.dev.yaml" >> $GITHUB_OUTPUT
        fi

    - name: Install oc CLI
      uses: redhat-actions/oc-installer@v1

    - name: Login to OpenShift
      run: |
        oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ vars.OPENSHIFT_SERVER }}

    - name: Deploy Database with Helm
      run: |
        helm upgrade --install csbc-single-digital-gateway-db ./infrastructure/helm/database \
          -n ${{ vars.OPENSHIFT_NAMESPACE }} \
          -f ./infrastructure/helm/database/${{ steps.env.outputs.values_file }} \
          --labels app.kubernetes.io/part-of=csbc-single-digital-gateway

name: CSBC SDG Quality Assurance Testing

on: 
  pull_request:
    branches:
      - develop

jobs:
  sdg-qa-testing:
    name: SDG QA Testing
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 4000
      NODE_ENV: test
      DB_NAME: test_db
      DB_HOST: 127.0.0.1
      DB_USER: test_user
      DB_PASS: test_password
      DB_PORT: 5432
      DB_SSL: false
      OIDC_ISSUER: ${{ vars.API_OIDC_ISSUER }}
      OIDC_CLIENT_ID: ${{ vars.API_OIDC_CLIENT_ID }}
      OIDC_CLIENT_SECRET: ${{ secrets.API_OIDC_CLIENT_SECRET }}
      OIDC_REDIRECT_URI: ${{ vars.API_OIDC_REDIRECT_URI }}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${{ vars.API_OIDC_POST_LOGOUT_REDIRECT_URI }}
      OIDC_CLIENT_AUTH_METHOD: ${{ vars.API_OIDC_CLIENT_AUTH_METHOD }}
      AUTH_OIDC_ISSUER: ${{ vars.API_AUTH_OIDC_ISSUER }}
      AUTH_OIDC_CLIENT_ID: ${{ vars.API_AUTH_OIDC_CLIENT_ID }}
      AUTH_OIDC_CLIENT_SECRET: ${{ secrets.API_AUTH_OIDC_CLIENT_SECRET }}
      AUTH_OIDC_REDIRECT_URI: ${{ vars.API_AUTH_OIDC_REDIRECT_URI }}
      AUTH_OIDC_POST_LOGOUT_REDIRECT_URI: ${{ vars.API_AUTH_OIDC_POST_LOGOUT_REDIRECT_URI }}
      AUTH_OIDC_CLIENT_AUTH_METHOD: ${{ vars.API_AUTH_OIDC_CLIENT_AUTH_METHOD }}
      SESSION_SECRET: ${{ secrets.API_SESSION_SECRET }}
      FRONTEND_URL: ${{ vars.API_FRONTEND_URL }}
      ADMIN_FRONTEND_URL: ${{ vars.API_ADMIN_FRONTEND_URL }}
      APP_PORT: 5173
      VITE_APP_NAME: "Single Digital Gateway"
      VITE_API_URI: http://127.0.0.1:4000
      VITE_AUTH_URL: http://127.0.0.1:4000
      VITE_CONSENT_MANAGER_API_URL: ${{ vars.WEB_CONSENT_MANAGER_API_URL }}
      VITE_SERVICE_CATALOGUE_API_URL: ${{ vars.WEB_SERVICE_CATALOGUE_API_URL }}
      CYPRESS_TEST_USERNAME: ${{ secrets.BCSC_TEST_USERNAME }}
      CYPRESS_TEST_PASSWORD: ${{ secrets.BCSC_TEST_PASSWORD }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci

      - name: Build Components
        run: npm run build

      - name: Database Migration
        run: npm run db:migrate

      - name: Start API Server
        run: |
          nohup npm run dev:api > /tmp/api-dev.log 2>&1 &
          npx wait-on --timeout 300000 http://127.0.0.1:5173 &

      - name: Start Web Server
        run: |
          nohup npm run dev:web > /tmp/web-dev.log 2>&1 &
          npx wait-on --timeout 300000 http://127.0.0.1:4000 &

      - name: Run API Integration Test
        run: npm run test:int

      - name: Run API Unit Test with Coverage
        run: npm run test:cov:api

      - name: Run Web Component Test with Coverage
        run: npm run test:cov:web

      - name: Run Web E2E Test
        run: nohup npm run test:e2e > /tmp/e2e-test.log 2>&1

      - name: Print dev logs on failure
        if: failure()
        run: |
          echo "=== API LOG ==="
          if [ -f /tmp/api-dev.log ]; then
            tail -n 300 /tmp/api-dev.log
          fi
          echo "=== WEB LOG ==="
          if [ -f /tmp/web-dev.log ]; then
            tail -n 300 /tmp/web-dev.log
          fi
          echo "=== E2E TEST LOG ==="
          if [ -f /tmp/e2e-test.log ]; then
            tail -n 300 /tmp/e2e-test.log
          fi

      - name: Remove Cookies File
        run: npm run cookies:delete

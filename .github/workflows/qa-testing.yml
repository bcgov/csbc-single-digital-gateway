name: CSBC SDG Quality Assurance Testing

on: 
  pull_request:
    branches:
      - develop

permissions:
   contents: read

jobs:
  api-qa-testing:
    name: API QA Testing
    runs-on: ubuntu-latest
    environment: development
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 4000
      NODE_ENV: test
      DB_NAME: test_db
      DB_HOST: localhost
      DB_USER: test_user
      DB_PASS: test_password
      DB_PORT: 5432
      DB_SSL: false
      OIDC_ISSUER: ${{ vars.API_OIDC_ISSUER }}
      OIDC_CLIENT_ID: ${{ vars.API_OIDC_CLIENT_ID }}
      OIDC_CLIENT_SECRET: ${{ secrets.API_OIDC_CLIENT_SECRET }}
      OIDC_REDIRECT_URI: ${{ vars.API_OIDC_REDIRECT_URI }}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${{ vars.API_OIDC_POST_LOGOUT_REDIRECT_URI }}
      OIDC_CLIENT_AUTH_METHOD: ${{ vars.API_OIDC_CLIENT_AUTH_METHOD }}
      AUTH_OIDC_ISSUER: ${{ vars.API_AUTH_OIDC_ISSUER }}
      AUTH_OIDC_CLIENT_ID: ${{ vars.API_AUTH_OIDC_CLIENT_ID }}
      AUTH_OIDC_CLIENT_SECRET: ${{ secrets.API_AUTH_OIDC_CLIENT_SECRET }}
      AUTH_OIDC_REDIRECT_URI: ${{ vars.API_AUTH_OIDC_REDIRECT_URI }}
      AUTH_OIDC_POST_LOGOUT_REDIRECT_URI: ${{ vars.API_AUTH_OIDC_POST_LOGOUT_REDIRECT_URI }}
      AUTH_OIDC_CLIENT_AUTH_METHOD: ${{ vars.API_AUTH_OIDC_CLIENT_AUTH_METHOD }}
      SESSION_SECRET: ${{ secrets.API_SESSION_SECRET }}
      FRONTEND_URL: ${{ vars.API_FRONTEND_URL }}
      ADMIN_FRONTEND_URL: ${{ vars.API_ADMIN_FRONTEND_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build API Components
        run: npm run build:api

      - name: Build @Repo/DB Components
        run: npm run build:@repo/db

      - name: Database Migration
        run: npm run db:migrate

      - name: Run API Integration Test
        run: npm run test:int

      - name: Run API Unit Test with Coverage
        run: npm run test:cov:api

  web-qa-testing:
    name: Web QA Testing
    runs-on: ubuntu-latest
    environment: development
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 4000
      NODE_ENV: test
      DB_NAME: test_db
      DB_HOST: localhost
      DB_USER: test_user
      DB_PASS: test_password
      DB_PORT: 5432
      DB_SSL: false
      OIDC_ISSUER: ${{ vars.API_OIDC_ISSUER }}
      OIDC_CLIENT_ID: ${{ vars.API_OIDC_CLIENT_ID }}
      OIDC_CLIENT_SECRET: ${{ secrets.API_OIDC_CLIENT_SECRET }}
      OIDC_REDIRECT_URI: ${{ vars.API_OIDC_REDIRECT_URI }}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${{ vars.API_OIDC_POST_LOGOUT_REDIRECT_URI }}
      OIDC_CLIENT_AUTH_METHOD: ${{ vars.API_OIDC_CLIENT_AUTH_METHOD }}
      AUTH_OIDC_ISSUER: ${{ vars.API_AUTH_OIDC_ISSUER }}
      AUTH_OIDC_CLIENT_ID: ${{ vars.API_AUTH_OIDC_CLIENT_ID }}
      AUTH_OIDC_CLIENT_SECRET: ${{ secrets.API_AUTH_OIDC_CLIENT_SECRET }}
      AUTH_OIDC_REDIRECT_URI: ${{ vars.API_AUTH_OIDC_REDIRECT_URI }}
      AUTH_OIDC_POST_LOGOUT_REDIRECT_URI: ${{ vars.API_AUTH_OIDC_POST_LOGOUT_REDIRECT_URI }}
      AUTH_OIDC_CLIENT_AUTH_METHOD: ${{ vars.API_AUTH_OIDC_CLIENT_AUTH_METHOD }}
      SESSION_SECRET: ${{ secrets.API_SESSION_SECRET }}
      FRONTEND_URL: ${{ vars.API_FRONTEND_URL }}
      ADMIN_FRONTEND_URL: ${{ vars.API_ADMIN_FRONTEND_URL }}
      APP_PORT: 5173
      VITE_API_URI: http://localhost:4000
      VITE_APP_NAME: "Single Digital Gateway"
      VITE_AUTH_URL: http://localhost:4000
      VITE_CONSENT_MANAGER_API_URL: ${{ vars.WEB_CONSENT_MANAGER_API_URL }}
      VITE_SERVICE_CATALOGUE_API_URL: ${{ vars.WEB_SERVICE_CATALOGUE_API_URL }}
      BCSC_TEST_USERNAME: ${{ secrets.BCSC_TEST_USERNAME }}
      BCSC_TEST_PASSWORD: ${{ secrets.BCSC_TEST_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Components
        run: npm run build

      - name: Database Migration
        run: npm run db:migrate

      - name: Start API and Web for E2E
        run: |
          nohup npm --workspace apps/api run dev > /tmp/api-dev.log 2>&1 &
          echo $! > /tmp/api-dev.pid
          nohup npm --workspace apps/web run dev > /tmp/web-dev.log 2>&1 &
          echo $! > /tmp/web-dev.pid

      - name: Verify API and Web processes started
        run: |
          set -e
          sleep 5
          API_PID=$(cat /tmp/api-dev.pid)
          WEB_PID=$(cat /tmp/web-dev.pid)
          if ! ps -p "$API_PID" > /dev/null; then
            echo "API process exited early"
            tail -n 200 /tmp/api-dev.log || true
            exit 1
          fi
          if ! ps -p "$WEB_PID" > /dev/null; then
            echo "Web process exited early"
            tail -n 200 /tmp/web-dev.log || true
            exit 1
          fi

      - name: Wait for API and Web
        run: npx wait-on@8.0.1 --timeout 600000 http://localhost:4000 http://localhost:5173

      - name: Run Web E2E Test
        run: npm run test:e2e

      - name: Print dev logs on failure
        if: failure()
        run: |
          echo "=== API LOG ===" 
          if [ -f /tmp/api-dev.log ]; then
            tail -n 300 /tmp/api-dev.log \
              | sed -E 's/(CLIENT_SECRET|SESSION_SECRET|PASSWORD|TOKEN|KEY)=([^[:space:]]+)/\1=***REDACTED***/g'
          fi
          echo "=== WEB LOG ==="
          if [ -f /tmp/web-dev.log ]; then
            tail -n 300 /tmp/web-dev.log \
              | sed -E 's/(CLIENT_SECRET|SESSION_SECRET|PASSWORD|TOKEN|KEY)=([^[:space:]]+)/\1=***REDACTED***/g'
          fi

      - name: Remove Auth-Cookies File
        run: npm run cookies:delete

      - name: Run Web Component Test with Coverage
        run: npm run test:cov:web
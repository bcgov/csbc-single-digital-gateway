{{- if .Values.configMap.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "api.configMapName" . }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
data:
  # Application configuration
  PORT: {{ .Values.app.port | quote }}
  NODE_ENV: {{ .Values.app.nodeEnv | quote }}

  # Database configuration (non-sensitive)
  # Note: DB_NAME, DB_HOST, DB_PORT, DB_USER, and DB_PASS are provided via secret in deployment
  DB_SSL: {{ .Values.app.database.ssl | quote }}

  # OIDC configuration (BCSC)
  OIDC_ISSUER: {{ .Values.app.oidc.issuer | quote }}
  OIDC_CLIENT_ID: {{ .Values.app.oidc.clientId | quote }}
  OIDC_REDIRECT_URI: {{ .Values.app.oidc.redirectUri | quote }}
  OIDC_POST_LOGOUT_REDIRECT_URI: {{ .Values.app.oidc.postLogoutRedirectUri | quote }}
  OIDC_CLIENT_AUTH_METHOD: {{ .Values.app.oidc.clientAuthMethod | quote }}

  # OIDC configuration (IDIR)
  AUTH_OIDC_ISSUER: {{ .Values.app.authOidc.issuer | quote }}
  AUTH_OIDC_CLIENT_ID: {{ .Values.app.authOidc.clientId | quote }}
  AUTH_OIDC_REDIRECT_URI: {{ .Values.app.authOidc.redirectUri | quote }}
  AUTH_OIDC_POST_LOGOUT_REDIRECT_URI: {{ .Values.app.authOidc.postLogoutRedirectUri | quote }}
  AUTH_OIDC_CLIENT_AUTH_METHOD: {{ .Values.app.authOidc.clientAuthMethod | quote }}

  # Frontend configuration
  FRONTEND_URL: {{ .Values.app.frontendUrl | quote }}
  ADMIN_FRONTEND_URL: {{ .Values.app.adminFrontendUrl | quote }}

  # External APIs (optional)
  PUBLIC_BODIES_API_URL: {{ .Values.app.publicBodiesApiUrl | quote }}
  WORKFLOW_API_URL: {{ .Values.app.workflowApiUrl | quote }}

  {{- with .Values.configMap.data }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}

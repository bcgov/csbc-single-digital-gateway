{{- if .Values.configMap.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "api.configMapName" . }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
data:
  # Application configuration
  PORT: {{ .Values.app.port | quote }}
  NODE_ENV: {{ .Values.app.nodeEnv | quote }}

  # Database configuration (non-sensitive)
  # Note: DB_NAME, DB_HOST, DB_PORT, DB_USER, and DB_PASS are provided via secret in deployment
  DB_SSL: {{ .Values.app.database.ssl | quote }}

  # OIDC configuration
  OIDC_ISSUER: {{ .Values.app.oidc.issuer | quote }}
  OIDC_JWKS_URI: {{ .Values.app.oidc.jwksUri | quote }}
  OIDC_CLIENT_ID: {{ .Values.app.oidc.clientId | quote }}
  OIDC_REDIRECT_URI: {{ .Values.app.oidc.redirectUri | quote }}
  OIDC_POST_LOGOUT_REDIRECT_URI: {{ .Values.app.oidc.postLogoutRedirectUri | quote }}

  # Frontend configuration
  FRONTEND_URL: {{ .Values.app.frontendUrl | quote }}

  {{- with .Values.configMap.data }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
